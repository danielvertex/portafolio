        - heading "Compare graphically a period of 30 days of adjusted closing price of two actions" [level=4] [ref=f2e38]
        - paragraph [ref=f2e39]:
          - text: In this option, I decided to use regular expressions to continue in the program until the user enters the date as requested. This way, I could separate the entered data into groups and request it in an organized way from
          - code [ref=f2e40]: yfinance
          - text: . It also verifies the tickers entered because there are many that may be similar, have no information, or do not exist. At the end, it generates an image with a
          - code [ref=f2e41]: .png
          - text: extension.
        - heading "Option 2" [level=3] [ref=f2e42]
        - heading "Business Summary" [level=4] [ref=f2e43]
        - paragraph [ref=f2e44]: You must enter a ticker for which it will print the company’s full name, sector, and a summary. If the ticker does not exist, it will ask for one again. If it exists but has no summary information, it will notify you.
        - heading "APPROACH" [level=2] [ref=f2e45]
        - paragraph [ref=f2e46]: I chose to use graphs and request data from a third party to process it. Then, I wanted to make it a bit more graphical and implement a small menu. Regular expressions came in handy to verify the data the user enters. This project helped me understand how to start a project, value the importance of reading documentation, and consider alternatives because there are multiple approaches to the same problem. It also allowed me to implement the knowledge acquired throughout the course.
