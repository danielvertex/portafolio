              - generic [ref=f8e574]:
                - paragraph [ref=f8e575]: Se realizó una verificación de los tipos de datos en el DataFrame para asegurarnos de que cada variable tenga el formato adecuado. Aunque en este caso el dataset contiene aproximadamente 300 observaciones, lo que no representa un volumen de datos muy grande, se aplicaron conversiones que pueden ser especialmente útiles en datasets más extensos, ya que ayudan a optimizar el uso de memoria y mejorar el rendimiento en ciertas operaciones.
                - paragraph [ref=f8e576]: "En este caso, se realizaron dos conversiones:"
                - list [ref=f8e577]:
                  - listitem [ref=f8e578]: Conversión de la variable "Sexo" a tipo category ya que las variables categóricas ocupan menos memoria y hacen que las operaciones como agrupaciones y filtrado sean más eficientes.
              - generic [ref=f8e581]:
                - generic [ref=f8e582]: "In [24]:"
                - generic [ref=f8e583]: doc_rename["Sexo"] = doc_rename["Sexo"].astype("category")
              - list [ref=f8e592]:
                - listitem [ref=f8e593]: Conversión de la variable "Marca temporal" a tipo datetime ya que permite realizar operaciones avanzadas con fechas, como cálculos de diferencias, filtrado por rango de tiempo y mejor interpretación de datos temporales.
              - generic [ref=f8e596]:
                - generic [ref=f8e597]: "In [26]:"
                - generic [ref=f8e598]: doc_rename["Marca temporal"] = pd.to_datetime(doc_rename["Marca temporal"])
              - generic [ref=f8e602]:
                - generic [ref=f8e604]:
                  - generic [ref=f8e605]: "In [27]:"
                  - generic [ref=f8e606]: doc_rename.dtypes
                - generic [ref=f8e612]:
                  - generic [ref=f8e613]: "Out[27]:"
                  - generic [ref=f8e614]: "Marca temporal datetime64[ns] Sexo category Edad int64 P1 int64 P2 int64 P3 int64 P4 int64 dtype: object"
              - heading "Transformación de la Escala del Ítem 4" [level=2] [ref=f8e621]
              - generic [ref=f8e626]:
                - paragraph [ref=f8e627]: "Para garantizar que la escala de respuesta sea homogénea en todo el cuestionario, se requiere que todos los ítems tengan la misma dirección, es decir, que 1 represente menor felicidad y 7 mayor felicidad. Sin embargo, el ítem 4 está invertido en comparación con los otros ítems, ya que en este caso:"
                - list [ref=f8e628]:
                  - listitem [ref=f8e629]: 1 indica "muy feliz"
                  - listitem [ref=f8e630]: "7 indica \"poco feliz\" Para corregir esta inconsistencia, se realizó una transformación en la que se invierte la puntuación del ítem 4 utilizando la siguiente fórmula:"
                - paragraph [ref=f8e631]: nuevo_valor = 8 − valor_original
                - paragraph [ref=f8e632]: "De esta manera:"
                - list [ref=f8e633]:
                  - listitem [ref=f8e634]: Si un encuestado puntúa 1, el nuevo valor será 8 − 1 = 7 8 − 1 = 7 , indicando mayor felicidad.
                  - listitem [ref=f8e635]: Si puntúa 7, se transformará a 8 − 7 = 1
              - generic [ref=f8e638]:
                - generic [ref=f8e639]: "In [30]:"
                - generic [ref=f8e640]: doc_rename["P4"] = 8 - doc_rename["P4"]
              - heading "Creación de la variable \"total\" (Escala de Felicidad)" [level=2] [ref=f8e649]
              - paragraph [ref=f8e655]: Se añadió la variable "total", que representa el promedio de las respuestas en los ítems P1, P2, P3 y P4, proporcionando así una medida agregada de felicidad para cada observación.
              - generic [ref=f8e658]:
                - generic [ref=f8e659]: "In [33]:"
                - generic [ref=f8e660]: doc_rename["total"] = doc_rename[["P1", "P2", "P3", "P4"]].mean(axis=1)
