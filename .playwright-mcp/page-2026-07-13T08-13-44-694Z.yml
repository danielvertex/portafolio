      - article [ref=f7e35]:
        - generic [ref=f7e36]:
          - heading "Introducción" [level=1] [ref=f7e37]
          - paragraph [ref=f7e38]: En el marco del taller “5 pasos para hacer análisis estadísticos”, se presentó una metodología clara para llevar a cabo estudios basados en datos, utilizando herramientas como Excel y SPSS. Sin embargo, para este análisis, decidí implementar todo el proceso en Python, aprovechando su flexibilidad y el poder de sus bibliotecas especializadas. A lo largo de este informe, seguiré los cinco pilares propuestos en el taller, desde la comprensión profunda del problema hasta la presentación de resultados, mostrando cómo Python facilita cada etapa del análisis.
          - paragraph [ref=f7e39]: "Siguiendo la metodología presentada en el taller, el análisis se desarrolló a partir de la estructura propuesta en la “Arquitectura de las decisiones basadas en datos”, que consta de cinco pilares fundamentales:"
          - paragraph [ref=f7e40]:
            - strong [ref=f7e41]: "Pilar 1: Cimientos. Comprensión Profunda"
            - text: El primer paso fue definir con claridad la pregunta de investigación y los objetivos del análisis. Esto permitió establecer la dirección del estudio y determinar qué datos serían necesarios para responder a las interrogantes planteadas.
          - paragraph [ref=f7e42]:
            - strong [ref=f7e43]: "Pilar 2: Primer Piso. Preparación de los Datos"
            - text: Con la pregunta y los objetivos definidos, se procedió a preparar los datos. Esto implicó realizar una limpieza cuidadosa, organizar y clasificar la información para garantizar un análisis fluido y preciso.
          - paragraph [ref=f7e44]:
            - strong [ref=f7e45]: "Pilar 3: Segundo Piso. Análisis Estadísticos"
            - text: En esta etapa se aplicaron los métodos estadísticos adecuados a la naturaleza de los datos y a los objetivos planteados, obteniendo tablas y gráficos que facilitaron la interpretación de los resultados.
          - paragraph [ref=f7e46]:
            - strong [ref=f7e47]: "Pilar 4: Tercer Piso. Análisis y Conclusiones"
            - text: A partir de los resultados obtenidos, se generó nueva información que permitió responder las preguntas iniciales, interpretando las relaciones entre las variables y extrayendo conclusiones valiosas.
          - paragraph [ref=f7e48]:
            - strong [ref=f7e49]: "Pilar 5: Techo. Presentación de Resultados y Propuestas de Impacto"
            - text: Finalmente, los resultados del análisis y las propuestas derivadas se presentaron de manera clara y estructurada, asegurando que el trabajo se tradujera en acciones y decisiones significativas.
          - 'heading "Pilar 1: Cimientos. Comprensión Profunda" [level=1] [ref=f7e50]'
          - paragraph [ref=f7e51]: "El primer paso consistió en aclarar nuestras preguntas y definir un objetivo de investigación: algo que no sabemos y que vamos a descubrir con los datos. Esto marcó la dirección del análisis, los datos que necesitaríamos y el enfoque de la investigación."
          - paragraph [ref=f7e52]: "En este caso, la pregunta que guió el análisis fue:"
          - list [ref=f7e53]:
            - listitem [ref=f7e54]: ¿Cuál será el nivel de felicidad de los profesionales que estamos ahora mismo en este taller?
          - paragraph [ref=f7e55]: "A partir de esta pregunta, se definieron los siguientes objetivos:"
          - list [ref=f7e56]:
            - listitem [ref=f7e57]:
              - paragraph [ref=f7e58]: Describir la edad y el sexo de los participantes del taller.
            - listitem [ref=f7e59]:
              - paragraph [ref=f7e60]: Conocer el nivel de felicidad entre los asistentes del taller.
            - listitem [ref=f7e61]:
              - paragraph [ref=f7e62]: Identificar si hay una relación entre el nivel de felicidad y la edad de los asistentes.
            - listitem [ref=f7e63]:
              - paragraph [ref=f7e64]: Identificar si hay una relación entre el nivel de felicidad y el sexo de los participantes, y observar si existen diferencias.
          - paragraph [ref=f7e65]: "Las unidades de estudio fueron los asistentes del taller en vivo, y las variables consideradas fueron:"
          - list [ref=f7e66]:
            - listitem [ref=f7e67]:
              - paragraph [ref=f7e68]: Edad del participante.
            - listitem [ref=f7e69]:
              - paragraph [ref=f7e70]: Sexo del participante.
            - listitem [ref=f7e71]:
              - paragraph [ref=f7e72]: Felicidad del participante.
          - paragraph [ref=f7e73]: Para recolectar estos datos, se utilizó una encuesta online auto administrada en Google Forms, y el nivel de felicidad se midió con la Escala de Felicidad Subjetiva (Lyubomirsky & Lepper, 1999).
