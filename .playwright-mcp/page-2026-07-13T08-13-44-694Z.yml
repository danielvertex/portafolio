          - 'heading "Pilar 4: Tercer Piso. Análisis y Conclusiones" [level=1] [ref=f7e77]'
          - paragraph [ref=f7e78]:
            - strong [ref=f7e79]: "Distribución del total por sexo:"
            - text: Se realizó un análisis de la distribución del total de felicidad subjetiva por sexo. Los resultados muestran que tanto hombres como mujeres tienen una mediana similar en sus niveles de felicidad subjetiva. Sin embargo, se observó una mayor dispersión en los hombres, con un valor atípico en el extremo inferior. Esto indica que, aunque las medianas son comparables, los hombres presentan mayor variabilidad en sus respuestas.
          - paragraph [ref=f7e80]:
            - strong [ref=f7e81]: "Distribución de participantes por sexo:"
            - text: Se observó que la muestra está compuesta por 189 hombres (57.4%) y 140 mujeres (42.6%). Esto indica una ligera sobrerrepresentación de hombres en la muestra analizada.
          - paragraph [ref=f7e82]:
            - strong [ref=f7e83]: "Diagrama de dispersión de edad por total de felicidad subjetiva:"
            - text: El análisis de dispersión entre la edad de los participantes y su nivel de felicidad subjetiva no muestra una relación clara o patrón evidente. Esto sugiere que la edad no está directamente asociada con los niveles de felicidad subjetiva en esta muestra.
          - paragraph [ref=f7e84]:
            - strong [ref=f7e85]: "Nivel de felicidad por edad:"
            - text: Se analizó la relación entre los niveles de felicidad subjetiva y la edad de los participantes. Los resultados muestran que los participantes con niveles de felicidad subjetiva más altos (6 y 7) tienden a ser mayores en promedio, mientras que los niveles más bajos (2 y 3) están asociados con edades ligeramente menores. Esto podría indicar una tendencia hacia mayores niveles de felicidad subjetiva en edades avanzadas.
          - paragraph [ref=f7e86]:
            - strong [ref=f7e87]: "Histograma del total de felicidad subjetiva:"
            - text: El histograma muestra que la distribución del total de felicidad subjetiva es aproximadamente simétrica, con un pico en el valor de 5. Esto indica que la mayoría de los participantes reportaron niveles moderados de felicidad subjetiva, mientras que los valores extremos (2 y 7) son menos frecuentes.
          - 'heading "Pilar 5: Techo. Presentación de Resultados y Propuestas de Impacto" [level=1] [ref=f7e88]'
          - list [ref=f7e89]:
            - listitem [ref=f7e90]: "Publicar un artículo en un blog: Escrir un artículo detallado en tu blog o en plataformas como Medium, explicando los hallazgos y su relevancia."
            - listitem [ref=f7e91]: "Infografías visuales: Crear infografías atractivas que resuman los resultados clave y compártelas en redes sociales como Instagram, LinkedIn o Twitter."
            - listitem [ref=f7e92]: "Publicaciones en redes sociales: Comparte fragmentos de tu análisis con gráficos y explicaciones breves en plataformas como LinkedIn, Twitter o Facebook."
            - listitem [ref=f7e93]: "Videos explicativos: Grabar un video corto explicando los resultados y su impacto, y publícarlo en YouTube o TikTok."
            - listitem [ref=f7e94]: "Infografía interactiva: Usar herramientas como Tableau o Power BI para crear gráficos interactivos que permitan a los usuarios explorar los datos."
          - paragraph [ref=f7e95]:
            - text: Con esto termina “5 pasos para hacer análisis estadísticos”. Espero que la información compartida te haya sido de utilidad y que puedas aplicar los conocimientos adquiridos en tu práctica profesional. Si deseas profundizar en análisis estadísticos y seguir desarrollando tus habilidades, te recomiendo visitar la página web de
