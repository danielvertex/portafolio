              - generic [ref=f8e1051]:
                - generic [ref=f8e1052]: "In [46]:"
                - generic [ref=f8e1053]: "def explorar_variables(data, columnas): resultados = {} for col in columnas: x = data[col] # Tamaño de la muestra n = len(x) # Estadísticos básicos media = np.mean(x) mediana = np.median(x) varianza = np.var(x, ddof=1) # ddof=1 para varianza muestral std = np.std(x, ddof=1) minimo = np.min(x) maximo = np.max(x) rango = maximo - minimo iqr = stats.iqr(x) # rango intercuartílico asimetria = stats.skew(x) curtosis = stats.kurtosis(x) # Media recortada al 5% media_recortada_5 = stats.trim_mean(x, 0.05) # Intervalo de confianza 95% para la media (suponiendo distribución ~ normal) sem = std / np.sqrt(n) # error estándar ci_95 = stats.t.interval(0.95, n - 1, loc=media, scale=sem) ci_inferior, ci_superior = ci_95 # Guardamos los resultados en un diccionario resultados[col] = { #'count': n, 'media': media, 'IC_95%_inf': ci_inferior, 'IC_95%_sup': ci_superior, 'media_recortada_5%': media_recortada_5, 'mediana': mediana, 'varianza': varianza, 'desv_estandar': std, 'minimo': minimo, 'maximo': maximo, 'rango': rango, 'rango_intercuartil': iqr, 'asimetria': asimetria, 'curtosis': curtosis } # Convertimos el diccionario en un DataFrame para visualizarlo mejor resultados = pd.DataFrame(resultados).unstack()#.T return resultados"
