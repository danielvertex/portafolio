              - paragraph [ref=f8e1033]:
                - text: Para obtener estadísticas descriptivas, el método
                - strong [ref=f8e1034]: .describe()
                - text: permite calcular medidas que resumen la tendencia central, la dispersión y la forma de la distribución de un conjunto de datos. No obstante, si se requiere obtener resultados equivalentes a los generados por el software SPSS, es posible desarrollar una función personalizada que reciba un DataFrame y la variable de interés, permitiendo así un análisis más detallado y completo.
