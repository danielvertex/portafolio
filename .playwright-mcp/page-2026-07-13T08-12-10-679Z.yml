  - main [ref=f4e24]:
    - generic [ref=f4e25]:
      - generic [ref=f4e26]:
        - heading "Google Data Analytics Capstone Project" [level=1] [ref=f4e27]
        - paragraph [ref=f4e28]: with background image
      - article [ref=f4e29]:
        - paragraph [ref=f4e30]:
          - text: You can find a slide presentation can be found
          - link "here" [ref=f4e31] [cursor=pointer]:
            - /url: https://drive.google.com/file/d/1uNC35c59zYAWCu7_nfDrw1dSJPzbGKoJ/view?usp=sharing
          - text: .
        - heading "INTRODUCCTION" [level=1] [ref=f4e32]
        - paragraph [ref=f4e33]: You are a junior data analyst working in the marketing analyst team at Cyclistic, a bike-share company in Chicago. The director of marketing believes the company’s future success depends on maximizing the number of annual memberships. Therefore, your team wants to understand how casual riders and annual members use Cyclistic bikes differently. From these insights, your team will design a new marketing strategy to convert casual riders into annual members. But first, Cyclistic executives must approve your recommendations, so they must be backed up with compelling data insights and professional data visualizations.
        - heading "SCENARIO" [level=1] [ref=f4e34]
        - paragraph [ref=f4e35]: You are a junior data analyst working in the marketing analyst team at Cyclistic, a bike-share company in Chicago. The director of marketing believes the company’s future success depends on maximizing the number of annual memberships. Therefore, your team wants to understand how casual riders and annual members use Cyclistic bikes differently. From these insights, your team will design a new marketing strategy to convert casual riders into annual members.
        - heading "Characters and Teams" [level=2] [ref=f4e36]
        - paragraph [ref=f4e37]:
          - strong [ref=f4e38]: "Cyclistic:"
          - text: A bike-sharing program that includes 5,800 bicycles and 600 stations. Cyclistic stands out for also offering recumbent bikes, hand tricycles, and cargo bikes that provide a more inclusive bike-sharing experience for people with disabilities and cyclists who cannot use a standard two-wheeled bicycle. Most cyclists choose traditional bikes, while around 8% of cyclists use the assisted options. Cyclistic users are more likely to ride for recreation, but about 30% use the bikes for commuting to work each day.
        - paragraph [ref=f4e39]:
          - strong [ref=f4e40]: "Lily Moreno:"
          - text: The Director of Marketing and your manager. Moreno is responsible for developing campaigns and initiatives to promote the bike-sharing program. Campaigns may include email, social media, and other channels.
        - paragraph [ref=f4e41]:
          - strong [ref=f4e42]: "Cyclistic’s Marketing Data Analytics Team:"
          - text: A team of data analysts responsible for collecting, analyzing, and reporting data that helps drive Cyclistic’s marketing strategy. You joined this team six months ago, and you have been dedicated not only to understanding Cyclistic’s mission and business goals but also to finding ways to help Cyclistic achieve them from your position as a junior data analyst.
        - paragraph [ref=f4e43]:
          - strong [ref=f4e44]: "Cyclistic Executive Team:"
          - text: The highly detail-oriented executive team will decide whether to approve the recommended marketing program.
        - heading "About the Company" [level=2] [ref=f4e45]
        - paragraph [ref=f4e46]: In 2016, Cyclistic launched a successful bike-sharing service. Since then, the program has grown to include a fleet of 5,824 geo-referenced bicycles, locked within a network of 692 stations throughout Chicago. The bikes can be unlocked from one station and returned to any other station in the system at any time.
        - paragraph [ref=f4e47]: "Until now, Cyclistic’s marketing strategy has focused on building general brand recognition and attracting broad consumer segments. One of the key approaches that made this possible was the flexibility of their pricing plans: single-ride passes, full-day passes, and annual memberships. Customers who purchase single-ride or full-day passes are called casual riders. Customers who purchase annual memberships are called Cyclistic members."
        - paragraph [ref=f4e48]: Cyclistic’s financial analysts concluded that annual members are far more profitable than casual riders. While the flexible pricing helps Cyclistic attract more customers, Moreno believes that maximizing the number of annual members will be key to future growth. Rather than creating a marketing campaign aimed at all new customers, Moreno believes there is significant potential to convert casual riders into members. She points out that casual riders are already familiar with Cyclistic’s program and have chosen Cyclistic for their mobility needs.
        - paragraph [ref=f4e49]: "Moreno set a clear goal: to design marketing strategies aimed at converting casual riders into annual members. However, to do so, the marketing analytics team needs a better understanding of how annual members and casual riders differ, why casual riders would purchase a membership, and how digital media might influence their marketing tactics. Moreno and her team are interested in analyzing Cyclistic’s historical bike trip data to identify trends."
        - heading "Questions" [level=2] [ref=f4e50]
        - paragraph [ref=f4e51]: "Three questions will guide the future marketing program: + How do annual members and casual riders differ in their use of Cyclistic’s bikes? + Why would casual riders purchase annual memberships from Cyclistic? + How can Cyclistic use digital media to influence casual riders to become members?"
        - paragraph [ref=f4e52]:
          - text: "Moreno assigned you the first question to answer:"
          - strong [ref=f4e53]: How do annual members and casual riders differ in their use of Cyclistic’s bikes?
        - paragraph [ref=f4e54]: "You will create a report with the following deliverables:"
        - list [ref=f4e55]:
          - listitem [ref=f4e56]: A clear instruction of the business task
          - listitem [ref=f4e57]: A description of all data sources used
          - listitem [ref=f4e58]: Documentation of all data cleaning and manipulations
          - listitem [ref=f4e59]: A summary of your analysis
          - listitem [ref=f4e60]: Supporting visualizations and key findings
          - listitem [ref=f4e61]: The three most important recommendations based on your analysis
        - paragraph [ref=f4e62]: "This project will follow the steps of the data analysis process: ask, prepare, process, analyze, share, and act."
        - heading "PREPARE" [level=1] [ref=f4e63]
        - paragraph [ref=f4e64]: "Historical ride data from Cyclistic will be used to analyze and identify trends. The latest 12 months of Cyclistic ride data can be downloaded here. (Note: The datasets have different datasets are appropriate and will enable the answering of the company’s questions. The data has been provided by Motivate International Inc. under this license.) These are public data that can be utilized to explore how different types of customers use Cyclistic bikes. However, it should be noted that, for privacy reasons, the use of personally identifiable information of cyclists is prohibited. This means that connections between pass purchases and credit card numbers cannot be established to determine if casual riders reside within the Cyclistic service area or if they have purchased multiple single-ride passes. The data for the entire year of 2023 was selected to avoid biases associated with partial periods and to ensure that factors such as holidays, seasons, and other seasonal patterns that may influence bicycle usage are taken into account, also meets the ROCCC criteria (Relevant, Original, Complete, Consistent, and Correct), ensuring the quality and reliability of the data for conducting an accurate analysis."
        - heading "PROCESS" [level=1] [ref=f4e65]
        - paragraph [ref=f4e66]: R with will be used for data analysis, statistics, and visualization due to their significant advantages. R is specifically designed for statistical tasks, featuring an extensive ecosystem of packages that enhance its capabilities, such as ggplot2 for visualization and dplyr for data manipulation. The active R community provides abundant resources and support. RStudio serves as an integrated development environment (IDE) that facilitates project organization, includes tools for syntax highlighting and debugging, and supports version control systems like Git. Additionally, RStudio’s integration with R Markdown allows for the creation of reproducible documents that combine text, code, and results, making it ideal for reporting. Together, R and RStudio create a powerful combination preferred by analysts and data scientists.
        - paragraph [ref=f4e67]: The data for the year comes in 12 separate CSV files, one for each month. Once downloaded, the compare_df_cols_same() function from the janitor package was used to verify that all 12 datasets were suitable for merging.
        - paragraph [ref=f4e68]: We start with loading the packages we will use.
        - generic [ref=f4e71]:
          - code [ref=f4e73]: "library(tidyverse) library(lubridate) library(ggplot2) library(dplyr) library(janitor) ## Warning: package 'janitor' was built under R version 4.4.3 library(scales) ## Warning: package 'scales' was built under R version 4.4.3 library(viridis) ## Warning: package 'viridis' was built under R version 4.4.3 library(hrbrthemes) ## Warning: package 'hrbrthemes' was built under R version 4.4.3 library(almanac) ## Warning: package 'almanac' was built under R version 4.4.3 library(Cairo) getwd() ## [1] \"D:/Proyecto_R\" setwd(\"D:/Proyecto_R\")"
