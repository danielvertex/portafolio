        - paragraph [ref=f4e112]:
          - text: The duration of each ride in minutes will be calculated and stored in the
          - code [ref=f4e113]: ride_length
          - text: column. The
          - code [ref=f4e114]: difftime
          - text: function computes the difference between the
          - code [ref=f4e115]: ended_at and
          - code [ref=f4e116]: started_at
          - text: timestamps. Initially, the result is of class
          - code [ref=f4e117]: difftime
          - text: ", which is not suitable for direct numerical operations."
        - generic [ref=f4e120]:
