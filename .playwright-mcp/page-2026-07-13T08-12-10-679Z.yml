        - paragraph [ref=f4e86]:
          - text: Before combining the datasets, it was checked whether the data frames were row-bindable. The function
          - code [ref=f4e87]: compare_df_cols()
          - text: was used, which returns TRUE if there are no mismatching rows.
        - generic [ref=f4e90]:
          - code [ref=f4e92]: "compare_df_cols_same(M01_2023,M02_2023,M03_2023,M04_2023,M05_2023,M06_2023,M07_2023,M08_2023,M09_2023,M10_2023,M11_2023,M12_2023) ## [1] TRUE"
