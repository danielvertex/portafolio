          - text: Based on the quartiles, most ride duration fall below 50 minutes. By setting this limit, the focus remains on the most relevant portion of the dataset, avoiding the distortion caused by extreme outliers. This helps to clearly visualize the central distribution of the data without being skewed by a few extreme values.
        - generic [ref=f4e185]:
          - code [ref=f4e187]: "sum(is.na(annual_data_v2$ride_length)) ## [1] 0 Q1 <- quantile(annual_data_v2$ride_length, 0.25, na.rm = TRUE) Q3 <- quantile(annual_data_v2$ride_length, 0.75, na.rm = TRUE) #Q1.2 <- quantile(annual_data_v2$ride_length, 0.25) #Q3.2 <- quantile(annual_data_v2$ride_length, 0.75) IQR_value <- Q3 - Q1 ### Definir límites (1.5 veces el IQR) lower_bound <- Q1 - 1.5 * IQR_value upper_bound <- Q3 + 1.5 * IQR_value ### Filtrar los valores dentro de estos límites annual_data_v2 <- annual_data_v2 %>% filter(ride_length >= lower_bound & ride_length <= upper_bound) # Crear el gráfico de violín con los datos filtrados annual_data_v2 %>% ggplot(aes(x = user_type, y = ride_length, fill = user_type)) + geom_violin(width = .4) + geom_boxplot(width = 0.1, color = \"black\", alpha = 0.2, outlier.shape = NA) + scale_fill_manual(values=c(\"#4DB6AC\", \"#FFAB40\")) + theme_ipsum() + labs(title = \"Ride length distribution by user type \", x =\"User type\",y= \"Ride Length (min)\", fill = \"User type\")"
